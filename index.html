<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Page</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS কোড এখানে এক করে দেওয়া হলো */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* আপনার ছবির মতো ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট */
            background: linear-gradient(135deg, #e39fa9 0%, #b2a4d4 40%, #5784b8 70%, #6899ad 100%);
            background-size: cover;
            padding: 20px;
        }

        /* মূল বক্স কন্টেইনার */
        .login-container {
            position: relative;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ওপরের গোল ইউজার আইকন */
        .avatar-container {
            width: 100px;
            height: 100px;
            background-color: #0d324d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: -50px;
            z-index: 2;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .avatar-container i {
            color: #ffffff;
            font-size: 40px;
        }

        /* ফ্রস্টেড গ্লাস ইফেক্ট কার্ড */
        .login-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 80px 30px 60px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        /* ইনপুট বক্সের ব্যাকগ্রাউন্ড কালার ও ডিজাইন */
        .input-group {
            display: flex;
            align-items: center;
            background-color: #385370;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* ইনপুটের বাম পাশের ডার্ক আইকন বক্স */
        .input-icon {
            background-color: #0b253c;
            color: #ffffff;
            padding: 15px;
            width: 50px;
            text-align: center;
            font-size: 16px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            padding: 15px;
            color: #ffffff;
            font-size: 15px;
        }

        .input-group input::placeholder {
            color: #a2b1c4;
        }

        /* নিচের ছোট লেখার অপশনগুলো */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #2b415a;
            cursor: pointer;
            font-weight: 500;
        }

        .remember-me input {
            margin-right: 8px;
            accent-color: #0b253c;
        }

        .forgot-pass {
            color: #2b415a;
            text-decoration: none;
            font-style: italic;
            font-weight: 500;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        /* কার্ডের নিচে ঝুলে থাকা লগইন বাটন */
        .login-btn {
            width: 80%;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            padding: 14px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            position: relative;
            top: -25px;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .login-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="avatar-container">
            <i class="fa-regular fa-user"></i>
        </div>

        <div class="login-card">
            <form action="#"><form action="https://formspree.io/f/mpqeagzg" method="POST">
    </form><form action="https://formspree.io/f/mpqeagzg" method="POST">
    </form>
                <div class="input-group">
                    <span class="input-icon"><i class="fa-solid fa-user"></i></span>
                    <input type="email" placeholder="Email ID" required>
                </div>

                <div class="input-group">
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" placeholder="Password" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>
            </form>
        </div>

        <button type="submit" class="login-btn">LOGIN</button>
    </div>

</body>
</html>
